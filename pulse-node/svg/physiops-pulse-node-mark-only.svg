<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">PhysioPS Pulse Node Mark Only</title>
  <desc id="desc">Pulse Node mark without container, intended for dark surfaces and motion systems.</desc>
  <defs>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="24%" stop-color="#7CFFD8"/>
      <stop offset="62%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#4A9EFF"/>
    </radialGradient>
    <linearGradient id="trace" x1="172" y1="256" x2="426" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="55%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#4A9EFF"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="180" cy="256" r="106" fill="none" stroke="#4A9EFF" stroke-opacity=".22" stroke-width="3" stroke-dasharray="10 18"/>
  <circle cx="180" cy="256" r="72" fill="none" stroke="#00E5A0" stroke-opacity=".55" stroke-width="4"/>
  <circle cx="180" cy="256" r="39" fill="url(#node)" filter="url(#glow)"/>
  <path d="M180 256 H232 L246 224 L268 304 L292 194 L318 256 H426" fill="none" stroke="url(#trace)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M180 256 H232 L246 224 L268 304 L292 194 L318 256 H426" fill="none" stroke="#F0F4F8" stroke-opacity=".35" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

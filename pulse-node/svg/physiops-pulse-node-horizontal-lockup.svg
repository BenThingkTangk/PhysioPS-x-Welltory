<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" role="img" aria-labelledby="title desc">
  <title id="title">PhysioPS Pulse Node Horizontal Lockup</title>
  <desc id="desc">Horizontal PhysioPS by HumanOS lockup with Pulse Node mark and brand wordmark.</desc>
  <defs>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="24%" stop-color="#7CFFD8"/>
      <stop offset="62%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#4A9EFF"/>
    </radialGradient>
    <linearGradient id="trace" x1="100" y1="160" x2="278" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="55%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#4A9EFF"/>
    </linearGradient>
    <linearGradient id="word" x1="340" y1="126" x2="850" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#8EC5FF"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="320" rx="54" fill="#030B14"/>
  <circle cx="100" cy="160" r="78" fill="none" stroke="#4A9EFF" stroke-opacity=".22" stroke-width="3" stroke-dasharray="10 18"/>
  <circle cx="100" cy="160" r="52" fill="none" stroke="#00E5A0" stroke-opacity=".55" stroke-width="4"/>
  <circle cx="100" cy="160" r="27" fill="url(#node)" filter="url(#glow)"/>
  <path d="M100 160 H144 L158 130 L176 210 L198 96 L222 160 H278" fill="none" stroke="url(#trace)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M100 160 H144 L158 130 L176 210 L198 96 L222 160 H278" fill="none" stroke="#F0F4F8" stroke-opacity=".35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="340" y="143" fill="url(#word)" font-family="Cabinet Grotesk, Satoshi, Inter, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-3">PhysioPS</text>
  <text x="343" y="196" fill="#8B9BB4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" font-weight="500" letter-spacing="4">ANS DIAGNOSTIC ENGINE · POWERED BY HUMANOS</text>
</svg>
